[project]
name = "astral-author"
version = "0.1.0"
description = "Newsletter authoring pipeline for Astral Index"
authors = [
    { name = "Aaron Taylor", email = "git@ataylor.io" }
]
requires-python = ">=3.14"
dependencies = [
    "astral-core",
    "anthropic>=0.40",
    "click>=8.1",
]

[project.scripts]
astral-author = "astral_author.cli:cli"

[build-system]
requires = ["uv_build>=0.10.7,<0.11.0"]
build-backend = "uv_build"

[tool.uv.sources]
astral-core = { workspace = true }
