[project]
name = "astral-core"
version = "0.1.0"
description = "Shared models and storage for Astral Index"
authors = [
    { name = "Aaron Taylor", email = "git@ataylor.io" }
]
requires-python = ">=3.14"
dependencies = [
    "pydantic>=2.6",
    "python-dateutil>=2.9",
]

[build-system]
requires = ["uv_build>=0.10.7,<0.11.0"]
build-backend = "uv_build"
