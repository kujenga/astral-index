[project]
name = "astral-ingest"
version = "0.1.0"
description = "Data scraping and ingestion for Astral Index"
authors = [
    { name = "Aaron Taylor", email = "git@ataylor.io" }
]
requires-python = ">=3.14"
dependencies = [
    "astral-core",
    "feedparser>=6.0.11",
    "httpx>=0.27",
    "click>=8.1",
    "pyyaml>=6.0",
    "asyncpraw>=7.8.1",
    "trafilatura>=2.0.0",
    "newspaper4k>=0.9.3",
    "readability-lxml>=0.8.4",
    "pdfplumber>=0.11.0",
    "anthropic>=0.40",
]

[project.optional-dependencies]
js = ["playwright>=1.45"]

[project.scripts]
astral-ingest = "astral_ingest.cli:cli"

[build-system]
requires = ["uv_build>=0.10.7,<0.11.0"]
build-backend = "uv_build"

[tool.uv.sources]
astral-core = { workspace = true }
