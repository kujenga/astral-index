repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  # ty: type checking (switch to official hook once astral-sh/ty#269 ships)
  - repo: local
    hooks:
      - id: ty-check
        name: ty type check
        entry: uv run --no-sync ty check
        language: system
        types: [python]
        pass_filenames: false
